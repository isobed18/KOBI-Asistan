services:
  api:
    build: .
    container_name: kobi-asistan-api
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./database:/app/database
      - ./static:/app/static
      - ./tenants:/app/tenants
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
