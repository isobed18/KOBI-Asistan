<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KOBİ Asistan — AI Chat</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #0f0f13;
            --bg-secondary: #1a1a24;
            --bg-card: #22222e;
            --accent: #6c5ce7;
            --accent-light: #a29bfe;
            --text-primary: #e8e8ef;
            --text-secondary: #9191a8;
            --success: #00cec9;
            --warning: #fdcb6e;
            --danger: #ff7675;
            --border: #2d2d3d;
            --tool-bg: #1e1e2e;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Header */
        .header {
            background: linear-gradient(135deg, var(--bg-secondary), var(--bg-card));
            border-bottom: 1px solid var(--border);
            padding: 16px 24px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .header .logo {
            width: 40px; height: 40px;
            background: linear-gradient(135deg, var(--accent), var(--accent-light));
            border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            font-size: 20px;
        }

        .header h1 {
            font-size: 18px;
            font-weight: 700;
            background: linear-gradient(135deg, var(--accent-light), var(--success));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .header .status {
            margin-left: auto;
            font-size: 12px;
            color: var(--success);
            display: flex; align-items: center; gap: 6px;
        }

        .header .status::before {
            content: '';
            width: 8px; height: 8px;
            background: var(--success);
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        /* Messages */
        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .messages::-webkit-scrollbar { width: 6px; }
        .messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

        .msg {
            max-width: 80%;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .msg.user {
            align-self: flex-end;
        }

        .msg.user .bubble {
            background: linear-gradient(135deg, var(--accent), #5a4bd1);
            border-radius: 18px 18px 4px 18px;
            padding: 12px 18px;
            color: white;
            font-size: 14px;
            line-height: 1.5;
        }

        .msg.assistant .bubble {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 18px 18px 18px 4px;
            padding: 14px 18px;
            font-size: 14px;
            line-height: 1.6;
        }

        .msg .label {
            font-size: 11px;
            color: var(--text-secondary);
            margin-bottom: 4px;
            padding: 0 8px;
        }

        /* Tool calls */
        .tool-call {
            background: var(--tool-bg);
            border: 1px solid var(--border);
            border-left: 3px solid var(--warning);
            border-radius: 8px;
            padding: 10px 14px;
            margin: 8px 0;
            font-size: 12px;
            animation: fadeIn 0.3s ease;
            max-width: 80%;
        }

        .tool-call .tool-header {
            display: flex;
            align-items: center;
            gap: 6px;
            color: var(--warning);
            font-weight: 600;
            margin-bottom: 4px;
        }

        .tool-call .tool-body {
            color: var(--text-secondary);
            font-family: 'Courier New', monospace;
            font-size: 11px;
            white-space: pre-wrap;
            max-height: 120px;
            overflow-y: auto;
        }

        /* Input */
        .input-area {
            background: var(--bg-secondary);
            border-top: 1px solid var(--border);
            padding: 16px 24px;
            display: flex;
            gap: 12px;
        }

        .input-area input {
            flex: 1;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 12px 18px;
            color: var(--text-primary);
            font-size: 14px;
            font-family: 'Inter', sans-serif;
            outline: none;
            transition: border-color 0.2s;
        }

        .input-area input:focus {
            border-color: var(--accent);
        }

        .input-area input::placeholder {
            color: var(--text-secondary);
        }

        .input-area button {
            background: linear-gradient(135deg, var(--accent), #5a4bd1);
            border: none;
            border-radius: 12px;
            padding: 12px 24px;
            color: white;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.15s, opacity 0.2s;
        }

        .input-area button:hover { transform: scale(1.03); }
        .input-area button:active { transform: scale(0.97); }
        .input-area button:disabled { opacity: 0.5; cursor: not-allowed; }

        /* Loading */
        .typing {
            display: flex;
            gap: 4px;
            padding: 8px;
        }

        .typing span {
            width: 8px; height: 8px;
            background: var(--text-secondary);
            border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out;
        }

        .typing span:nth-child(2) { animation-delay: 0.16s; }
        .typing span:nth-child(3) { animation-delay: 0.32s; }

        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0.6); }
            40% { transform: scale(1); }
        }

        /* Quick actions */
        .quick-actions {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            padding: 0 24px 12px;
        }

        .quick-btn {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 6px 14px;
            color: var(--text-secondary);
            font-size: 12px;
            cursor: pointer;
            transition: all 0.2s;
            font-family: 'Inter', sans-serif;
        }

        .quick-btn:hover {
            border-color: var(--accent);
            color: var(--accent-light);
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo">🏪</div>
        <h1>KOBİ Asistan</h1>
        <div class="status">Çevrimiçi</div>
    </div>

    <div class="messages" id="messages">
        <div class="msg assistant">
            <div class="label">KOBİ Asistan</div>
            <div class="bubble">
                Merhaba! 👋 Ben KOBİ Asistan, sipariş, stok ve kargo sorularınız için buradayım. Size nasıl yardımcı olabilirim?
            </div>
        </div>
    </div>

    <div class="quick-actions">
        <button class="quick-btn" onclick="sendQuick('2 numaralı siparişim nerede?')">📦 Sipariş sorgula</button>
        <button class="quick-btn" onclick="sendQuick('Zeytinyağı var mı?')">🔍 Stok kontrol</button>
        <button class="quick-btn" onclick="sendQuick('Bugünkü durum nedir?')">📊 Günlük özet</button>
        <button class="quick-btn" onclick="sendQuick('Hangi ürünler kritik stokta?')">⚠️ Kritik stoklar</button>
    </div>

    <div class="input-area">
        <input type="text" id="input" placeholder="Mesajınızı yazın..." autocomplete="off">
        <button id="sendBtn" onclick="sendMessage()">Gönder</button>
    </div>

    <script>
        const messagesEl = document.getElementById('messages');
        const inputEl = document.getElementById('input');
        const sendBtn = document.getElementById('sendBtn');
        let sessionId = null;

        inputEl.addEventListener('keydown', e => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        function sendQuick(text) {
            inputEl.value = text;
            sendMessage();
        }

        function addMessage(role, content) {
            const div = document.createElement('div');
            div.className = `msg ${role}`;
            div.innerHTML = `
                <div class="label">${role === 'user' ? 'Siz' : 'KOBİ Asistan'}</div>
                <div class="bubble">${formatContent(content)}</div>
            `;
            messagesEl.appendChild(div);
            messagesEl.scrollTop = messagesEl.scrollHeight;
        }

        function addToolCall(toolName, toolInput) {
            const div = document.createElement('div');
            div.className = 'tool-call';
            div.innerHTML = `
                <div class="tool-header">🔧 Tool: ${toolName}</div>
                <div class="tool-body">${JSON.stringify(toolInput, null, 2)}</div>
            `;
            messagesEl.appendChild(div);
            messagesEl.scrollTop = messagesEl.scrollHeight;
        }

        function showTyping() {
            const div = document.createElement('div');
            div.className = 'msg assistant';
            div.id = 'typing';
            div.innerHTML = `
                <div class="label">KOBİ Asistan</div>
                <div class="typing"><span></span><span></span><span></span></div>
            `;
            messagesEl.appendChild(div);
            messagesEl.scrollTop = messagesEl.scrollHeight;
        }

        function removeTyping() {
            const el = document.getElementById('typing');
            if (el) el.remove();
        }

        function formatContent(text) {
            if (!text) return '';
            return text
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/\n/g, '<br>')
                .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
                .replace(/\*(.*?)\*/g, '<em>$1</em>');
        }

        async function sendMessage() {
            const text = inputEl.value.trim();
            if (!text) return;

            inputEl.value = '';
            sendBtn.disabled = true;
            addMessage('user', text);
            showTyping();

            try {
                // SSE stream kullan
                const response = await fetch('/api/v1/chat/stream', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        mesaj: text,
                        session_id: sessionId
                    })
                });

                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                let buffer = '';

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;

                    buffer += decoder.decode(value, { stream: true });
                    const lines = buffer.split('\n');
                    buffer = lines.pop();

                    for (const line of lines) {
                        if (!line.startsWith('data: ')) continue;
                        try {
                            const data = JSON.parse(line.slice(6));

                            if (data.type === 'tool_call') {
                                addToolCall(data.tool, data.input);
                            } else if (data.type === 'tool_result') {
                                // Tool sonucu — isteğe bağlı göster
                            } else if (data.type === 'response') {
                                removeTyping();
                                addMessage('assistant', data.content);
                                if (data.session_id) sessionId = data.session_id;
                            } else if (data.type === 'blocked') {
                                removeTyping();
                                addMessage('assistant', '⚠️ ' + data.content);
                            } else if (data.type === 'error') {
                                removeTyping();
                                addMessage('assistant', '❌ Hata: ' + data.content);
                            }
                        } catch (e) { /* skip parse errors */ }
                    }
                }
            } catch (err) {
                removeTyping();
                addMessage('assistant', '❌ Bağlantı hatası: ' + err.message);
            }

            removeTyping();
            sendBtn.disabled = false;
            inputEl.focus();
        }
    </script>
</body>
</html>
